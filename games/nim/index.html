<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nim Game</title>
  <link rel="stylesheet" href="../../style.css" />
  <style>
    .nim-game { max-width: 600px; margin: auto; background: white; padding: 20px; }
    .controls input, .controls button { margin: 5px; padding: 5px; }
    #game-state { font-family: monospace; white-space: pre; margin-top: 20px; }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="site-name">my site</div>
    <div class="nav-buttons">
      <a href="../index.html">Home Page</a>
      <a href="../lib/links.html">Internet Bookmark</a>
      <a href="index.html">Games</a>
      <a href="#">Button 4</a>
      <a href="#">Button 5</a>
    </div>
  </div>

  <div class="main-content nim-game">
    <h1>Nim (Multi-Heap)</h1>
    <div class="controls">
      <label for="heap-input">Heap:</label>
      <input id="heap-input" type="number" min="0" />
      <label for="count-input">Count:</label>
      <input id="count-input" type="number" min="1" />
      <button onclick="playerMove()">Take</button>
    </div>
    <div id="game-state"></div>
    <div class="message" id="message"></div>
  </div>

  <script src="nim.js"></script>

</body>
</html>
